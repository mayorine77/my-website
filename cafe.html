<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Yuuri - 至福のひととき</title>
  <link rel="stylesheet" href="cafe-style.css?v=13">
</head>
<body>

  <header>
    <nav class="cafe-nav">
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#access">Access</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="cafe-hero">
    <div class="hero-text">
      <h1>Cafe Yuuri</h1>
      <p>こだわりの豆と、静かな時間。</p>
    </div>
  </section>

  <section id="menu" class="cafe-content">
    <h2>Menu</h2>
    <div class="menu-list">
      
      <div class="menu-item cafe-card">
        <img src="latte.jpg" alt="Cafe Latte" class="menu-img">
        <div class="menu-text">
          <h3>Cafe Latte</h3>
          <p>こだわりの豆とミルク。 ¥550</p>
        </div>
      </div>

      <div class="menu-item cafe-card featured">
        <img src="galette.jpg" alt="Galette" class="menu-img">
        <div class="menu-text">
          <h3>Galette</h3>
          <p>ランチに人気。 ¥800</p>
        </div>
      </div>

      <div class="menu-item cafe-card">
        <img src="tiramisu.png" alt="Tiramisu" class="menu-img">
        <div class="menu-text">
          <h3>Tiramisu</h3>
          <p>自家製デザート。 ¥600</p>
        </div>
      </div>

    </div>
  </section>

  <section id="access" class="cafe-content">
    <h2>Access</h2>
    <p>住所：東京都○○区△△ 1-2-3</p>
    <p>営業時間：10:00 〜 19:00（火曜定休）</p>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Cafe Yuuri</p>
  </footer>

</body>
</html>
